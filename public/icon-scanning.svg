<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="21" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Mid ring -->
  <circle cx="24" cy="24" r="14" stroke="#00D4FF" stroke-width="1.2" stroke-opacity="0.45"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="7" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#00D4FF"/>
  <!-- Scan line (upper-right direction) -->
  <line x1="24" y1="24" x2="38" y2="10" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Sweep arc highlight -->
  <path d="M 24 10 A 14 14 0 0 1 38 24" fill="rgba(0,212,255,0.07)" stroke="none"/>
  <path d="M 24 10 A 14 14 0 0 1 38 24" fill="none" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Blip: detected signal (cyan) -->
  <circle cx="33" cy="14" r="3" fill="#00D4FF" opacity="0.9"/>
  <circle cx="33" cy="14" r="5.5" fill="rgba(0,212,255,0.2)"/>
  <!-- Blip: second signal (green = found/positive) -->
  <circle cx="17" cy="12" r="2.5" fill="#4ADE80" opacity="0.85"/>
  <circle cx="17" cy="12" r="4.5" fill="rgba(74,222,128,0.2)"/>
</svg>
