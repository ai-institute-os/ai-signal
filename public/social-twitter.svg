<svg width="1200" height="628" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tw-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0C1E3A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
    <linearGradient id="tw-accent-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="60%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tw-headline-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7DF9FF"/>
    </linearGradient>
    <radialGradient id="tw-center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
    </radialGradient>
    <pattern id="tw-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#tw-bg)"/>
  <rect width="1200" height="628" fill="url(#tw-dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#tw-accent-bar)"/>

  <!-- Center ambient glow -->
  <ellipse cx="600" cy="314" rx="480" ry="350" fill="url(#tw-center-glow)"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- CENTERED LAYOUT (Twitter card style)        -->
  <!-- ─────────────────────────────────────────── -->

  <!-- Brand logo — top center -->
  <text x="600" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1.8" text-anchor="middle">AI<tspan fill="#00D4FF">Signal</tspan></text>

  <!-- Divider line below logo -->
  <line x1="480" y1="102" x2="720" y2="102" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

  <!-- Main headline - big and bold -->
  <text x="600" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-2.2" text-anchor="middle">AI anbefaler nogen</text>
  <text x="600" y="237" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-2.2" text-anchor="middle">i din kategori.</text>
  <!-- Cyan question line -->
  <text x="600" y="299" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="800" fill="url(#tw-headline-glow)" letter-spacing="-2.2" text-anchor="middle">Er det dig?</text>

  <!-- Subtext -->
  <text x="600" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)" text-anchor="middle">Ugentlig AI-overvågning — gratis — direkte i indbakken.</text>

  <!-- Stats row: 3 key numbers -->
  <rect x="195" y="378" width="810" height="80" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>

  <!-- Stat 1: ChatGPT + Gemini + Perplexity -->
  <text x="335" y="413" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="335" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">AI-modeller overvåget</text>
  <line x1="465" y1="390" x2="465" y2="446" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 2: Weekly -->
  <text x="600" y="413" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#00D4FF" text-anchor="middle">Ugentlig</text>
  <text x="600" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">automatisk rapport</text>
  <line x1="735" y1="390" x2="735" y2="446" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Stat 3: Free -->
  <text x="865" y="413" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#4ADE80" text-anchor="middle">Gratis</text>
  <text x="865" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">ingen kreditkort</text>

  <!-- CTA button + URL -->
  <rect x="450" y="484" width="300" height="54" rx="12" fill="#00D4FF"/>
  <text x="600" y="517" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" fill="#0A1628" text-anchor="middle">aisignal.dk  →</text>

  <!-- Trust micro-copy -->
  <text x="600" y="567" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">✓ Ingen binding   ✓ Resultater på 2 min   ✓ Ingen opkald</text>

  <!-- Bottom branding -->
  <text x="600" y="601" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.15)" text-anchor="middle">AI Institute ApS  ·  aisignal.dk  ·  2026</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="6" fill="url(#tw-accent-bar)" opacity="0.6"/>

  <!-- Decorative corner elements -->
  <!-- Top-left corner accent -->
  <path d="M0 0 L80 0 L80 6 L6 6 L6 80 L0 80 Z" fill="rgba(0,212,255,0.08)"/>
  <!-- Top-right corner accent -->
  <path d="M1200 0 L1120 0 L1120 6 L1194 6 L1194 80 L1200 80 Z" fill="rgba(0,212,255,0.08)"/>
  <!-- Bottom-left corner accent -->
  <path d="M0 628 L80 628 L80 622 L6 622 L6 548 L0 548 Z" fill="rgba(0,212,255,0.08)"/>
  <!-- Bottom-right corner accent -->
  <path d="M1200 628 L1120 628 L1120 622 L1194 622 L1194 548 L1200 548 Z" fill="rgba(0,212,255,0.08)"/>
</svg>
