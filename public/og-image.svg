<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1F3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8CC;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00D4FF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles top-right -->
  <circle cx="1020" cy="140" r="230" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.07"/>
  <circle cx="1020" cy="140" r="165" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.05"/>
  <circle cx="1020" cy="140" r="95" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.09"/>

  <!-- Large pulse/signal wave decorative right side -->
  <g transform="translate(750, 250)" filter="url(#glow)" opacity="0.18">
    <polyline points="0,120 50,120 90,60 130,175 170,30 210,145 250,100 300,100"
      fill="none" stroke="#00D4FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Second wave, softer -->
  <g transform="translate(750, 320)" opacity="0.07">
    <polyline points="0,100 60,100 100,55 150,150 200,25 250,120 300,80 350,80"
      fill="none" stroke="#00D4FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Radiating signal arcs -->
  <g transform="translate(1060, 400)" opacity="0.1">
    <path d="M -50 0 A 50 50 0 0 1 50 0" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <path d="M -80 20 A 80 80 0 0 1 80 20" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
    <path d="M -110 40 A 110 110 0 0 1 110 40" fill="none" stroke="#00D4FF" stroke-width="1"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Left accent vertical bar -->
  <rect x="72" y="80" width="3" height="470" fill="#00D4FF" opacity="0.15"/>

  <!-- Logo section - top left -->
  <g transform="translate(100, 85) scale(2.2)">
    <!-- Icon mark -->
    <rect width="40" height="40" x="2" y="2" rx="8" fill="#0A1628" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M21 7 L28.5 28 H25.5 L23.8 23.5 H18.2 L16.5 28 H13.5 L21 7 Z M21 12.5 L19.7 20 H22.3 Z" fill="white"/>
    <!-- Pulse wave icon -->
    <polyline points="25,28 27,24 29,30 31,20 33,28 36,28" fill="none" stroke="#00D4FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wordmark -->
    <text x="52" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#00D4FF" letter-spacing="-0.3">AI</text>
    <text x="74" y="28" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="-0.3">Signal</text>
  </g>

  <!-- "NYT" label / badge -->
  <rect x="100" y="235" width="72" height="30" rx="5" fill="#00D4FF" opacity="0.18"/>
  <rect x="100" y="235" width="72" height="30" rx="5" fill="none" stroke="#00D4FF" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="136" y="256" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#00D4FF" text-anchor="middle" letter-spacing="1.5">UGENTLIG</text>

  <!-- Main tagline -->
  <text x="100" y="330" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1.5">Ugentlige</text>
  <text x="100" y="408" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#00D4FF" letter-spacing="-1.5">AI-signaler</text>

  <!-- Divider line under tagline -->
  <rect x="100" y="430" width="380" height="3" rx="2" fill="#00D4FF" opacity="0.6"/>

  <!-- Subtitle / value prop -->
  <text x="100" y="476" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="white" opacity="0.75" letter-spacing="0.2">Hold dig opdateret med AI-udviklingen.</text>
  <text x="100" y="508" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="white" opacity="0.75" letter-spacing="0.2">Direkte i din indbakke, hver uge.</text>

  <!-- Free signup badge -->
  <rect x="100" y="540" width="220" height="52" rx="8" fill="#00D4FF" opacity="0.15"/>
  <rect x="100" y="540" width="220" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="210" y="572" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#00D4FF" text-anchor="middle" letter-spacing="0.5">Gratis signup</text>

  <!-- Dot indicator - "live" feel -->
  <circle cx="344" cy="566" r="5" fill="#00D4FF" opacity="0.9"/>
  <circle cx="344" cy="566" r="9" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <!-- URL bottom right -->
  <text x="1120" y="600" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="white" opacity="0.35" text-anchor="end" letter-spacing="0.5">aisignal.dk</text>
</svg>
